services:

  # ─── MySQL ────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: fieldsuite_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fieldsuite
      MYSQL_USER: fieldsuite
      MYSQL_PASSWORD: fieldsuite
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  # ─── phpMyAdmin ───────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: fieldsuite_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: fieldsuite
      PMA_PASSWORD: fieldsuite
      UPLOAD_LIMIT: 64M
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy

  # ─── Symfony (PHP-FPM + nginx) ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: fieldsuite_backend
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: dev
      DATABASE_URL: "mysql://fieldsuite:fieldsuite@db:3306/fieldsuite?serverVersion=8.0&charset=utf8mb4"
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: fieldsuite_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  # ─── React frontend (dev) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: fieldsuite_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  db_data:
